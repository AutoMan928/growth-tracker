name: Deploy to Alibaba Cloud ECS (PM2)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            PROJECT_DIR="/opt/growth-tracker"

            # 首次部署：克隆仓库
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "📦 首次部署，克隆仓库..."
              git clone git@github.com:AutoMan928/growth-tracker.git $PROJECT_DIR
            fi

            cd $PROJECT_DIR

            # 拉取最新代码
            echo "⬇️  拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main

            # 安装依赖
            echo "📦 安装依赖..."
            npm ci

            # 生成 Prisma 客户端 + 初始化数据库
            echo "🗄️  初始化数据库..."
            npx prisma generate
            npx prisma db push --skip-generate

            # 构建
            echo "🔨 构建项目..."
            npm run build

            # PM2 启动或重载
            echo "🚀 启动/重载服务..."
            if pm2 describe growth-tracker > /dev/null 2>&1; then
              pm2 reload growth-tracker --update-env
            else
              pm2 start npm --name "growth-tracker" -- start
              pm2 save
            fi

            echo "✅ 部署完成！"
